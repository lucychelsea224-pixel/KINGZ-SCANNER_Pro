# Netlify Configuration for KINGZ-SCANNER Pro
# Single-file PWA deployment

[build]
  # No build command - single file PWA
  command = ""
  publish = "."

# Redirect all routes to index.html (SPA behavior)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache strategy for HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "text/html; charset=utf-8"

# Cache strategy for service worker (always fresh)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript"

# Cache strategy for static assets
[[headers]]
  for = "/*.{js,json,svg,jpg,jpeg,png,gif,webp,woff,woff2,ttf,eot}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Enable gzip compression for text
[[headers]]
  for = "/*.{html,css,js,json}"
  [headers.values]
    Content-Encoding = "gzip"

