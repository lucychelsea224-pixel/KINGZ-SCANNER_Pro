# Netlify Configuration for KINGZ-SCANNER Pro

[build]
  # No build command needed - single file PWA
  command = ""
  publish = "."

# Redirect rules for single-page app
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache settings
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Service Worker cache - no cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Manifest cache
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/manifest+json"

# HTML file cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/html; charset=utf-8"

# Image cache (1 day)
[[headers]]
  for = "/*.{jpg,jpeg,png,gif,webp,svg}"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Enable GZIP compression
[[headers]]
  for = "/*"
  [headers.values]
    Content-Encoding = "gzip"
